{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<section class="form-card narrow"><p class="eyebrow">새 계정 만들기</p><h1>회원가입</h1>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>사용자명<input name="username" required minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+" autocomplete="username"><small>영문, 숫자, 밑줄 3~20자</small></label>
    <label>비밀번호<input type="password" name="password" required minlength="10" maxlength="128" autocomplete="new-password"><small>대·소문자, 숫자, 특수문자를 포함한 10자 이상</small></label>
    <button class="button full" type="submit">가입하기</button>
  </form>
</section>
{% endblock %}

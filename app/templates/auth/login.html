{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
<section class="form-card narrow"><p class="eyebrow">다시 만나 반갑습니다</p><h1>로그인</h1>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>사용자명<input name="username" required maxlength="20" autocomplete="username"></label>
    <label>비밀번호<input type="password" name="password" required maxlength="128" autocomplete="current-password"></label>
    <button class="button full" type="submit">로그인</button>
  </form>
</section>
{% endblock %}
